name: CI/CD — Build · Push · Promote

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION:    us-central1
  AR_HOST:   us-central1-docker.pkg.dev
  AR_REPO:   motamaze/backend        # {project}/{ar-repository}
  IMAGE:     motamaze-backend

# ─────────────────────────────────────────────────────────────────────────────
# ST-01 — Build Docker image
# Runs on every PR (build only) and on every merge to main (build + push).
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required by Workload Identity Federation (ST-02)

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Auth (ST-02) ────────────────────────────────────────────────────────
      # Secrets WIF_PROVIDER and WIF_SERVICE_ACCOUNT are configured in
      # CI-001 ST-02 (Create AR repo + Workload Identity Federation).
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      # ── Image metadata ───────────────────────────────────────────────────────
      - name: Set image tag
        id: meta
        run: |
          BASE="${{ env.AR_HOST }}/${{ env.AR_REPO }}/${{ env.IMAGE }}"
          echo "image=${BASE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_BASE=${BASE}"              >> "$GITHUB_ENV"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # push only on merge, not PRs
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false   # avoids multi-platform manifest that Cloud Run rejects

# ─────────────────────────────────────────────────────────────────────────────
# ST-03 — Deploy to dev (same image digest, no rebuild)
# Runs only on merge to main, after build job succeeds.
# ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: motamaze-backend
          region:  ${{ env.REGION }}
          project: motamaze-dev
          image:   ${{ needs.build.outputs.image }}

# ─────────────────────────────────────────────────────────────────────────────
# ST-03 — Promote to prod (same digest, manual approval required)
# staging environment deferred to ~1 month post-prod launch (2026-06-22 decision)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod      # requires manual approval in GitHub → Settings → Environments
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: motamaze-backend
          region:  ${{ env.REGION }}
          project: motamaze
          image:   ${{ needs.build.outputs.image }}
